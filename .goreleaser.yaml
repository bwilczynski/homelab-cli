version: 2

project_name: hlctl

before:
  hooks:
    - go mod tidy

builds:
  - binary: hlctl
    main: ./cmd/hlctl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.specVersion={{.Env.SPEC_VERSION}}

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

brews:
  - name: hlctl
    directory: Formula
    repository:
      owner: bwilczynski
      name: homebrew-tap
      branch: master
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/bwilczynski/homelab-cli"
    description: "CLI for managing homelab infrastructure"
    test: |
      system "#{bin}/hlctl", "--version"
